spring.application.name=diet-fitness-planner

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/diet_fitness_planner?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=dietFitnessPlannerSecretKeyWhichIsLongEnoughForHS512AlgorithmRequirement2024
app.jwt.expiration-ms=86400000

# Server
server.port=1010

# CORS
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201
